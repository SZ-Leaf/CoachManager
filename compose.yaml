# Run from the repo root: docker compose up --build
# MySQL and compose settings: copy from .env (project root). Do not commit real secrets.

services:
  ###> doctrine/doctrine-bundle ###
  database:
    image: mysql:${MYSQL_VERSION}
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 5s
      retries: 10
      start_period: 30s
    ports:
      - "${MYSQL_PORT}:3306"
    volumes:
      - database_data:/var/lib/mysql
  ###< doctrine/doctrine-bundle ###

  # Web UI for MySQL (dev): http://localhost:${PHPMYADMIN_PORT}
  phpmyadmin:
    image: phpmyadmin:5-apache
    environment:
      PMA_HOST: database
      PMA_PORT: 3306
    ports:
      - "${PHPMYADMIN_PORT}:80"
    depends_on:
      database:
        condition: service_healthy

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:80" # Symfony API (browser: http://localhost:8080)
    volumes:
      - ./backend:/var/www/html
    environment:
      APP_ENV: dev
      APP_DEBUG: "1"
      APP_SECRET: ${APP_SECRET}
      DATABASE_URL: "mysql://${MYSQL_USER}:${MYSQL_PASSWORD}@database:3306/${MYSQL_DATABASE}?serverVersion=${MYSQL_SERVER_VERSION}&charset=utf8mb4"
    depends_on:
      database:
        condition: service_healthy

  client:
    build:
      context: "./coachManager client"
      dockerfile: Dockerfile
      target: development
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8080}
    depends_on:
      - backend

  # Production UI: docker build -f "coachManager client/Dockerfile" --target production -t coach-client:prod "./coachManager client"

volumes:
  ###> doctrine/doctrine-bundle ###
  database_data:
  ###< doctrine/doctrine-bundle ###
